<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Web Security Attack Surface Map</title>

<style>
.webmap-root{
  color-scheme: dark;

  --bg0: #0a0f1a;
  --bg1: #111827;
  --panel: rgba(255,255,255,.06);
  --border: rgba(255,255,255,.12);
  --text: #eef2f8;
  --muted: #94a3b8;
  --shadow: 0 25px 50px -12px rgba(0,0,0,.8);
  --radius: 20px;
  --glow: 0 0 15px rgba(106,168,255,.3);

  --blue: #60a5fa;
  --orange: #fb923c;
  --red: #f87171;
  --purple: #c084fc;
  --teal: #2dd4bf;
  --green: #4ade80;
  --yellow: #facc15;

  font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(1200px 800px at 10% 20%, rgba(96,165,250,.15), transparent 60%),
    radial-gradient(1000px 700px at 90% 70%, rgba(74,222,128,.12), transparent 55%),
    linear-gradient(145deg, var(--bg0), var(--bg1));
  color: var(--text);
  min-height: 100vh;
  margin: 0;
  line-height: 1.5;
}

.webmap-root *{ box-sizing:border-box; }

.webmap-container{
  max-width: 1700px;
  margin: 0 auto;
  padding: 20px;
}

.webmap-header{
  display:flex;
  justify-content:space-between;
  gap:24px;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.webmap-title{
  padding:18px 20px;
  border-radius:var(--radius);
  background:linear-gradient(165deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  flex:1;
  backdrop-filter:blur(10px);
  min-width:320px;
}

.webmap-title h1{
  margin:0;
  font-size:30px;
  font-weight:800;
  letter-spacing:-0.5px;
}

.webmap-title .red{
  background: linear-gradient(135deg, var(--red), #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.webmap-title .blue{
  background: linear-gradient(135deg, var(--blue), #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.webmap-sub{
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.badge{
  background: rgba(96,165,250,.15);
  border: 1px solid rgba(96,165,250,.3);
  padding: 4px 10px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 600;
}

.webmap-controls{
  width:520px;
  padding:18px;
  border-radius:var(--radius);
  background:linear-gradient(165deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  min-width:320px;
}

.webmap-row{
  display:flex;
  gap:12px;
  margin-bottom:12px;
}

.webmap-input,
.webmap-btn{
  width:100%;
  padding:11px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.3);
  color:var(--text);
  font-size:14px;
  transition:all .2s ease;
}

.webmap-input::placeholder{ color: rgba(148,163,184,.85); }

.webmap-input:focus{
  outline: none;
  border-color: var(--blue);
  box-shadow: var(--glow);
}

.webmap-btn{
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(180deg, rgba(96,165,250,.25), rgba(96,165,250,.1));
  border:1px solid rgba(96,165,250,.3);
  letter-spacing:0.3px;
}

.webmap-btn:hover{
  background:linear-gradient(180deg, rgba(96,165,250,.35), rgba(96,165,250,.15));
  border-color: rgba(96,165,250,.5);
  transform:translateY(-1px);
}

.webmap-btn.secondary{
  background:rgba(255,255,255,.08);
  border-color:var(--border);
}

.webmap-btn.secondary:hover{
  background:rgba(255,255,255,.12);
}

/* Custom dropdowns */
.webmap-dd{ position:relative; width:100%; }

.webmap-dd-btn{
  width:100%;
  padding:11px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.3);
  color:var(--text);
  font-size:14px;
  transition:all .2s ease;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.webmap-dd-btn:hover{ border-color: rgba(255,255,255,.22); }

.webmap-dd-btn:focus{
  outline:none;
  border-color: var(--blue);
  box-shadow: var(--glow);
}

.webmap-dd-label{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.webmap-dd-caret{
  width:10px;
  height:10px;
  border-right:2px solid rgba(238,242,248,.85);
  border-bottom:2px solid rgba(238,242,248,.85);
  transform:rotate(45deg);
  margin-top:-2px;
  flex:0 0 auto;
  opacity:.9;
}

.webmap-dd-panel{
  position:absolute;
  left:0;
  right:0;
  top:calc(100% + 10px);
  background:linear-gradient(165deg, rgba(17,24,39,.98), rgba(26,31,46,.98));
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  box-shadow: 0 25px 60px rgba(0,0,0,.65);
  padding:10px;
  z-index:1200;
  display:none;
  max-height:320px;
  overflow:auto;
  backdrop-filter: blur(10px);
}

.webmap-dd.open .webmap-dd-panel{ display:block; }

.webmap-dd-item{
  width:100%;
  text-align:left;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid transparent;
  background:transparent;
  color:rgba(238,242,248,.92);
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.webmap-dd-item:hover{
  background:rgba(255,255,255,.06);
  border-color: rgba(255,255,255,.10);
}

.webmap-dd-item[aria-selected="true"]{
  background:rgba(96,165,250,.12);
  border-color: rgba(96,165,250,.25);
}

.webmap-dd-hint{
  font-size:12px;
  color:rgba(148,163,184,.9);
}

.webmap-stats{
  display:flex;
  gap:18px;
  margin-bottom:14px;
  padding:14px 18px;
  background:rgba(255,255,255,.03);
  border-radius:40px;
  border:1px solid var(--border);
  font-size:13px;
  flex-wrap:wrap;
}

.stat-item{ display:flex; align-items:center; gap:8px; }
.stat-dot{ width:10px; height:10px; border-radius:50%; }
.stat-dot.blackbox{ background:var(--blue); }
.stat-dot.greybox{ background:var(--purple); }
.stat-dot.whitebox{ background:var(--green); }

.webmap-disclaimer{
  margin-top:0;
  margin-bottom:14px;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  color:rgba(148,163,184,.95);
  font-size:12px;
  line-height:1.45;
  max-width:1100px;
}

/* Board */
.webmap-board{
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:rgba(0,0,0,.25);
  box-shadow:var(--shadow);
  padding:18px;
  overflow-y:auto;
  overflow-x:hidden;
  backdrop-filter:blur(4px);
  -webkit-overflow-scrolling: touch;
  scrollbar-gutter: stable;
  scrollbar-width: thin;
  max-height: calc(100vh - 320px);
}

/* Fit to one page using scale */
.webmap-fit{
  transform-origin: top left;
  transform: scale(var(--fitScale, 1));
  width: max-content;
}

.webmap-fit-spacer{
  height: calc(var(--fitHeight, 0px) * var(--fitScale, 1));
}

/* Columns: keep a natural width, then scale down to fit viewport */
.webmap-columns{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns: 240px;
  gap:12px;
  width:max-content;
}

/* Cards and columns */
.webmap-column{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:12px;
}

.webmap-col-title{
  font-size:12px;
  font-weight:800;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:2px solid currentColor;
}

.webmap-col-title.discovery{color:var(--blue);}
.webmap-col-title.auth{color:var(--orange);}
.webmap-col-title.input{color:var(--purple);}
.webmap-col-title.logic{color:var(--red);}
.webmap-col-title.api{color:var(--teal);}
.webmap-col-title.data{color:var(--green);}
.webmap-col-title.infrastructure{color:var(--yellow);}

.webmap-card{
  border-radius:14px;
  padding:10px;
  margin-bottom:9px;
  border:1px solid rgba(255,255,255,.1);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  cursor:pointer;
  transition:all .2s ease;
  position:relative;
  overflow:hidden;
}

.webmap-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity:0;
  transition: opacity .2s ease;
}

.webmap-card:hover::before{ opacity:0.5; }

.webmap-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.3);
  box-shadow:0 10px 20px -10px rgba(0,0,0,.5);
}

.webmap-card.hidden{ display:none; }

.webmap-card-title{
  font-weight:800;
  font-size:13.5px;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:6px;
}

.severity-indicator{
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:50%;
  margin-right:6px;
}

.severity-critical{ background:var(--red); box-shadow:0 0 10px var(--red); }
.severity-high{ background:var(--orange); box-shadow:0 0 8px var(--orange); }
.severity-medium{ background:var(--yellow); box-shadow:0 0 8px var(--yellow); }
.severity-low{ background:var(--green); box-shadow:0 0 8px var(--green); }

.webmap-card-sub{
  font-size:11.25px;
  color:var(--muted);
  line-height:1.4;
}

.tech-tag{
  display:inline-block;
  font-size:10px;
  padding:2px 6px;
  border-radius:20px;
  background:rgba(255,255,255,.1);
  margin-top:6px;
  margin-right:4px;
}

/* Drawer */
.webmap-drawer{
  position:fixed;
  right:0;
  top:0;
  width:500px;
  height:100%;
  background:linear-gradient(165deg, #111827, #1a1f2e);
  border-left:1px solid var(--border);
  box-shadow:-20px 0 50px rgba(0,0,0,.7);
  transform:translateX(100%);
  transition:.35s cubic-bezier(0.4, 0, 0.2, 1);
  padding:28px;
  overflow:auto;
  z-index:1400;
  backdrop-filter:blur(10px);
}

.webmap-drawer.open{ transform:translateX(0); }

.webmap-drawer h2{
  margin-top:0;
  font-size:24px;
  font-weight:800;
  background:linear-gradient(135deg, var(--text), #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.webmap-drawer h3{
  margin-top:20px;
  margin-bottom:10px;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--blue);
  font-weight:800;
}

.webmap-drawer ul{
  padding-left:20px;
  margin:8px 0;
}

.webmap-drawer li{
  margin-bottom:6px;
  color:var(--muted);
}

.evidence-box{
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin:10px 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size:12px;
}

.webmap-close{
  margin-top:18px;
  padding:12px 20px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg, var(--red), #b91c1c);
  color:white;
  cursor:pointer;
  font-weight:800;
  width:100%;
  font-size:14px;
  transition:all .2s ease;
}

.webmap-close:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px -5px rgba(185,28,28,.5);
}

.webmap-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  opacity:0;
  pointer-events:none;
  transition: opacity .2s ease;
  z-index:1300;
}

.webmap-overlay.open{
  opacity:1;
  pointer-events:auto;
}

/* On very small screens, do not force scale-fit (keep readable, allow vertical scroll) */
@media (max-width: 980px){
  .webmap-board{ max-height: none; }
  .webmap-fit{ transform:none; width:auto; }
  .webmap-columns{
    grid-auto-flow:row;
    grid-template-columns: 1fr;
    width:auto;
  }
}

/* Example styling */
.example-box{
  background: rgba(0,0,0,.4);
  border-left: 3px solid var(--blue);
  padding: 12px;
  margin: 10px 0 0 0;
  border-radius: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12px;
  white-space: pre-wrap;
  overflow-x: auto;
}

.example-request{ color: #8b9bb5; }
.example-response{
  color: #a5b4fc;
  margin-top: 8px;
  border-top: 1px dashed rgba(255,255,255,.1);
  padding-top: 8px;
}
</style>
</head>

<body class="webmap-root">
<div class="webmap-container">

  <div class="webmap-header">
    <div class="webmap-title">
      <h1>
        <span> Web</span>
        <span class="red">Security</span>
        <span class="blue">Attack Surface Map</span>
      </h1>
      <div class="webmap-sub">
        <span class="badge" id="webmap-vector-badge">0 Attack Vectors</span>
        <span class="badge" id="webmap-visible-badge">0 Shown</span>
      </div>
    </div>

    <div class="webmap-controls">
      <div class="webmap-row">
        <input id="webmap-search" class="webmap-input" placeholder="Search attacks, techniques, vectors..."/>
      </div>

      <div class="webmap-row">
        <div class="webmap-dd" id="webmap-dd-mode">
          <button id="webmap-mode-btn" class="webmap-dd-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="webmap-mode-label" class="webmap-dd-label">All Testing Modes</span>
            <span class="webmap-dd-caret" aria-hidden="true"></span>
          </button>
          <div class="webmap-dd-panel" role="listbox" aria-label="Testing Modes">
            <button class="webmap-dd-item" type="button" role="option" data-value="all" aria-selected="true">
              <span>All Testing Modes</span>
              <span class="webmap-dd-hint">No filter</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="blackbox" aria-selected="false">
              <span>Blackbox</span>
              <span class="webmap-dd-hint">No knowledge</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="greybox" aria-selected="false">
              <span>Greybox</span>
              <span class="webmap-dd-hint">Partial access</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="whitebox" aria-selected="false">
              <span>Whitebox</span>
              <span class="webmap-dd-hint">Full access</span>
            </button>
          </div>
        </div>
      </div>

      <div class="webmap-row">
        <div class="webmap-dd" id="webmap-dd-severity">
          <button id="webmap-severity-btn" class="webmap-dd-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="webmap-severity-label" class="webmap-dd-label">All Severities</span>
            <span class="webmap-dd-caret" aria-hidden="true"></span>
          </button>
          <div class="webmap-dd-panel" role="listbox" aria-label="Severities">
            <button class="webmap-dd-item" type="button" role="option" data-value="all" aria-selected="true">
              <span>All Severities</span>
              <span class="webmap-dd-hint">No filter</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="critical" aria-selected="false">
              <span>Critical Severity</span>
              <span class="webmap-dd-hint">Typically 9.0 to 10.0</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="high" aria-selected="false">
              <span>High Severity</span>
              <span class="webmap-dd-hint">Typically 7.0 to 8.9</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="medium" aria-selected="false">
              <span>Medium Severity</span>
              <span class="webmap-dd-hint">Typically 4.0 to 6.9</span>
            </button>
            <button class="webmap-dd-item" type="button" role="option" data-value="low" aria-selected="false">
              <span>Low Severity</span>
              <span class="webmap-dd-hint">Typically 0.1 to 3.9</span>
            </button>
          </div>
        </div>
      </div>

      <div class="webmap-row">
        <div class="webmap-dd" id="webmap-dd-owasp">
          <button id="webmap-owasp-btn" class="webmap-dd-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="webmap-owasp-label" class="webmap-dd-label">OWASP Top 10 2025: All</span>
            <span class="webmap-dd-caret" aria-hidden="true"></span>
          </button>
          <div class="webmap-dd-panel" role="listbox" aria-label="OWASP Top 10 2025">
            <button class="webmap-dd-item" type="button" role="option" data-value="all" aria-selected="true">
              <span>OWASP Top 10 2025: All</span>
              <span class="webmap-dd-hint">No filter</span>
            </button>
          </div>
        </div>
      </div>

      <div class="webmap-row">
        <button id="webmap-reset" class="webmap-btn secondary" type="button">Reset Filters</button>
      </div>
    </div>
  </div>

  <div class="webmap-stats">
    <div class="stat-item"><span class="stat-dot blackbox"></span> Blackbox: <span id="webmap-stat-blackbox">0</span> vectors</div>
    <div class="stat-item"><span class="stat-dot greybox"></span> Greybox: <span id="webmap-stat-greybox">0</span> vectors</div>
    <div class="stat-item"><span class="stat-dot whitebox"></span> Whitebox: <span id="webmap-stat-whitebox">0</span> vectors</div>
  </div>

  <div class="webmap-disclaimer" id="webmap-disclaimer">
    Mode counts overlap. A single vector can be testable in multiple modes, so totals will not sum to the overall vector count.
  </div>

  <div class="webmap-board" id="webmap-board">
    <div class="webmap-fit" id="webmap-fit">
      <div class="webmap-columns" id="webmap-columns"></div>
    </div>
    <div class="webmap-fit-spacer" id="webmap-fit-spacer" aria-hidden="true"></div>
  </div>
</div>

<div id="webmap-overlay" class="webmap-overlay"></div>

<div id="webmap-drawer" class="webmap-drawer" aria-hidden="true">
  <h2 id="webmap-drawer-title"></h2>
  <div id="webmap-drawer-body"></div>
  <div id="webmap-drawer-tools" class="evidence-box"></div>
  <button class="webmap-close" id="webmap-close-btn" type="button">Close Details</button>
</div>

<script>
const COLUMNS = [
  { key:"discovery", title:"DISCOVERY", cls:"discovery" },
  { key:"auth", title:"AUTHENTICATION", cls:"auth" },
  { key:"injection", title:"INJECTION", cls:"input" },
  { key:"access", title:"ACCESS CONTROL", cls:"logic" },
  { key:"api", title:"API SECURITY", cls:"api" },
  { key:"data", title:"DATA SECURITY", cls:"data" },
  { key:"infra", title:"INFRASTRUCTURE", cls:"infrastructure" }
];

/*
OWASP Top 10 2025 mapping keys (used only for filtering and display).
Reference pages exist for the 2025 list. :contentReference[oaicite:1]{index=1}
*/
const OWASP_2025 = [
  { key:"A01:2025", name:"Broken Access Control" },
  { key:"A02:2025", name:"Security Misconfiguration" },
  { key:"A03:2025", name:"Software Supply Chain Failures" },
  { key:"A04:2025", name:"Cryptographic Failures" },
  { key:"A05:2025", name:"Injection" },
  { key:"A06:2025", name:"Insecure Design" },
  { key:"A07:2025", name:"Authentication Failures" },
  { key:"A08:2025", name:"Software or Data Integrity Failures" },
  { key:"A09:2025", name:"Security Logging and Alerting Failures" },
  { key:"A10:2025", name:"Mishandling of Exceptional Conditions" }
];

/*
Note on examples:
They are written as "evidence style" snippets, not copy and paste exploitation payloads.
This keeps the page useful for reporting and education without turning it into a payload library.
*/
const VECTORS = [
  // Discovery
  {
    id:"recon", col:"discovery",
    title:"Surface Mapping",
    sub:"Endpoints, APIs, parameters, technologies",
    modes:["blackbox","greybox","whitebox"],
    severity:"medium",
    tags:["burp","crawler"],
    owasp:["A02:2025","A06:2025"],
    example:{
      request:"GET /api/v1/users?id=1 HTTP/1.1\nHost: target.example\nAuthorization: Bearer [redacted]",
      response:"HTTP/1.1 200 OK\nContent-Type: application/json\n\n{\"id\":1,\"name\":\"User\",\"role\":\"user\"}",
      note:"Endpoint and parameter discovered. Review access control checks and rate limits."
    }
  },
  {
    id:"content-discovery", col:"discovery",
    title:"Content Discovery",
    sub:"Hidden pages, legacy routes, staging hints",
    modes:["blackbox","greybox","whitebox"],
    severity:"medium",
    tags:["crawler"],
    owasp:["A02:2025","A06:2025"],

const state = {
  q: "",
  mode: "all",
  severity: "all",
  owasp: "all"
};

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeText(s){ return (s || "").toLowerCase(); }

function severityToCvss(sev){
  const s = (sev || "medium").toLowerCase();
  if (s === "critical") return "9.0-10.0 (typical range)";
  if (s === "high") return "7.0-8.9 (typical range)";
  if (s === "medium") return "4.0-6.9 (typical range)";
  return "0.1-3.9 (typical range)";
}

function severityColor(sev){
  const s = (sev || "medium").toLowerCase();
  if (s === "critical") return "var(--red)";
  if (s === "high") return "var(--orange)";
  if (s === "medium") return "var(--yellow)";
  return "var(--green)";
}

function openDrawer(title, bodyHtml, sev, owaspKeys){
  document.getElementById("webmap-drawer-title").innerText = title;

  const color = severityColor(sev);
  const cvss = severityToCvss(sev);

  const owaspText = (owaspKeys || [])
    .map(k => {
      const hit = OWASP_2025.find(x => x.key === k);
      return hit ? `${hit.key} ${hit.name}` : k;
    })
    .join(", ");

  document.getElementById("webmap-drawer-body").innerHTML = bodyHtml;

  document.getElementById("webmap-drawer-tools").innerHTML = `
    <strong>Severity:</strong>
    <span style="color:${color}; font-weight:800;">${escapeHtml((sev || "medium").toUpperCase())}</span><br>
    <strong>CVSS v3.1:</strong> ${escapeHtml(cvss)}<br>
    <strong>OWASP Top 10 2025:</strong> ${escapeHtml(owaspText || "Not mapped")}<br>
    <strong>Note:</strong> Keep testing authorized and within scope. Focus on evidence, detection, and remediation.
  `;

  document.getElementById("webmap-overlay").classList.add("open");
  document.getElementById("webmap-drawer").classList.add("open");
  document.getElementById("webmap-drawer").setAttribute("aria-hidden", "false");
}

function webmapClose(){
  document.getElementById("webmap-drawer").classList.remove("open");
  document.getElementById("webmap-overlay").classList.remove("open");
  document.getElementById("webmap-drawer").setAttribute("aria-hidden", "true");
}

function closeAllDropdowns(){
  document.querySelectorAll(".webmap-dd.open").forEach(dd => {
    dd.classList.remove("open");
    const btn = dd.querySelector(".webmap-dd-btn");
    if (btn) btn.setAttribute("aria-expanded", "false");
  });
}

function setSelected(dd, value){
  dd.querySelectorAll(".webmap-dd-item").forEach(it => {
    it.setAttribute("aria-selected", String(it.dataset.value === value));
  });
}

function initDropdown(ddId, labelId, onPick){
  const dd = document.getElementById(ddId);
  const btn = dd.querySelector(".webmap-dd-btn");
  const label = document.getElementById(labelId);

  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const isOpen = dd.classList.contains("open");
    closeAllDropdowns();
    if (!isOpen){
      dd.classList.add("open");
      btn.setAttribute("aria-expanded", "true");
    }
  });

  dd.querySelectorAll(".webmap-dd-item").forEach(it => {
    it.addEventListener("click", (e) => {
      e.preventDefault();
      const value = it.dataset.value;
      const leftText = it.querySelector("span") ? it.querySelector("span").innerText.trim() : value;
      label.textContent = leftText;
      setSelected(dd, value);
      closeAllDropdowns();
      onPick(value);
    });
  });
}

function updateStats(){
  const all = VECTORS.length;
  const modeCounts = { blackbox:0, greybox:0, whitebox:0 };

  VECTORS.forEach(v => {
    const modes = v.modes || [];
    if (modes.includes("blackbox")) modeCounts.blackbox++;
    if (modes.includes("greybox")) modeCounts.greybox++;
    if (modes.includes("whitebox")) modeCounts.whitebox++;
  });

  const badge = document.getElementById("webmap-vector-badge");
  if (badge) badge.textContent = `${all} Attack Vectors`;

  const elB = document.getElementById("webmap-stat-blackbox");
  const elG = document.getElementById("webmap-stat-greybox");
  const elW = document.getElementById("webmap-stat-whitebox");
  if (elB) elB.textContent = String(modeCounts.blackbox);
  if (elG) elG.textContent = String(modeCounts.greybox);
  if (elW) elW.textContent = String(modeCounts.whitebox);
}

function updateVisibleBadge(){
  const cards = [...document.querySelectorAll(".webmap-card")];
  const shown = cards.filter(c => !c.classList.contains("hidden")).length;
  const el = document.getElementById("webmap-visible-badge");
  if (el) el.textContent = `${shown} Shown`;
}

function applyFilters(){
  const q = normalizeText(state.q);
  const mode = state.mode;
  const severity = state.severity;
  const owasp = state.owasp;

  const cards = [...document.querySelectorAll(".webmap-card")];
  cards.forEach(c => {
    const textOk = !q || normalizeText(c.innerText).includes(q);
    const modeOk = mode === "all" || (c.dataset.modes || "").split(",").map(x => x.trim()).includes(mode);
    const sev = (c.dataset.severity || "all").toLowerCase();
    const severityOk = severity === "all" || sev === severity;

    const owaspList = (c.dataset.owasp || "").split(",").map(x => x.trim()).filter(Boolean);
    const owaspOk = owasp === "all" || owaspList.includes(owasp);

    c.classList.toggle("hidden", !(textOk && modeOk && severityOk && owaspOk));
  });

  updateVisibleBadge();
  requestAnimationFrame(updateFitScale);
}

function formatExample(example){
  if (!example) return "";
  const req = example.request ? `<div class="example-request"><strong>Request:</strong>\n${escapeHtml(example.request)}</div>` : "";
  const res = example.response ? `<div class="example-response"><strong>Response:</strong>\n${escapeHtml(example.response)}</div>` : "";
  const note = example.note ? `<div style="margin-top:8px; color:var(--muted);"><strong>Note:</strong> ${escapeHtml(example.note)}</div>` : "";
  return `<h3>Evidence example</h3><div class="example-box">${req}${res}${note}</div>`;
}

function render(){
  updateStats();

  const columnsEl = document.getElementById("webmap-columns");
  columnsEl.innerHTML = "";

  const byCol = {};
  COLUMNS.forEach(c => byCol[c.key] = []);
  VECTORS.forEach(v => {
    if (!byCol[v.col]) byCol[v.col] = [];
    byCol[v.col].push(v);
  });

  COLUMNS.forEach(c => {
    const col = document.createElement("div");
    col.className = "webmap-column";
    col.innerHTML = `<div class="webmap-col-title ${c.cls}">${escapeHtml(c.title)}</div>`;

    const items = byCol[c.key] || [];
    items.forEach(v => {
      const card = document.createElement("div");
      card.className = "webmap-card";
      card.dataset.id = v.id;
      card.dataset.modes = (v.modes || []).join(",");
      card.dataset.severity = v.severity || "medium";
      card.dataset.owasp = (v.owasp || []).join(",");

      const sevCls =
        v.severity === "critical" ? "severity-critical" :
        v.severity === "high" ? "severity-high" :
        v.severity === "medium" ? "severity-medium" :
        "severity-low";

      const tags = (v.tags || []).map(t => `<span class="tech-tag">${escapeHtml(t)}</span>`).join("");

      card.innerHTML = `
        <div class="webmap-card-title">
          <span class="severity-indicator ${sevCls}"></span>
          ${escapeHtml(v.title)}
        </div>
        <div class="webmap-card-sub">${escapeHtml(v.sub || "")}</div>
        ${tags}
      `;

      card.addEventListener("click", () => {
        const owaspText = (v.owasp || [])
          .map(k => {
            const hit = OWASP_2025.find(x => x.key === k);
            return hit ? `${hit.key} ${hit.name}` : k;
          })
          .join(", ");

        const body = `
          <p><strong>${escapeHtml(v.title)}</strong></p>
          <p>${escapeHtml(v.sub || "")}</p>

          <h3>Testing methodology</h3>
          <ul>
            <li>Identify endpoints, preconditions, and roles</li>
            <li>Compare behavior across tenants and permissions</li>
            <li>Validate server side enforcement and safe errors</li>
            <li>Capture minimal evidence with clear impact</li>
          </ul>

          <h3>Remediation themes</h3>
          <ul>
            <li>Server side authorization and validation</li>
            <li>Secure defaults and configuration hygiene</li>
            <li>Strong session and token handling</li>
            <li>Logging, alerting, and abuse controls</li>
          </ul>

          <h3>OWASP Top 10 2025 mapping</h3>
          <p>${escapeHtml(owaspText || "Not mapped")}</p>

          ${v.example ? formatExample(v.example) : ""}
        `;

        openDrawer(v.title, body, v.severity, v.owasp || []);
        location.hash = `#${encodeURIComponent(v.id)}`;
      });

      col.appendChild(card);
    });

    columnsEl.appendChild(col);
  });

  applyFilters();
  requestAnimationFrame(updateFitScale);
}

function updateFitScale(){
  const board = document.getElementById("webmap-board");
  const fit = document.getElementById("webmap-fit");
  const spacer = document.getElementById("webmap-fit-spacer");
  const columns = document.getElementById("webmap-columns");
  if (!board || !fit || !spacer || !columns) return;

  const isSmall = window.matchMedia("(max-width: 980px)").matches;
  if (isSmall){
    board.style.setProperty("--fitScale", "1");
    board.style.setProperty("--fitHeight", "0px");
    return;
  }

  const available = board.clientWidth - 8;
  const contentWidth = columns.scrollWidth;

  let scale = 1;
  if (contentWidth > 0) scale = Math.min(1, available / contentWidth);

  board.style.setProperty("--fitScale", String(scale));

  const contentHeight = columns.scrollHeight;
  board.style.setProperty("--fitHeight", contentHeight + "px");
}

function buildOwaspDropdown(){
  const panel = document.querySelector("#webmap-dd-owasp .webmap-dd-panel");
  if (!panel) return;

  // Keep the first "all" item
  const keep = panel.querySelector('[data-value="all"]');
  panel.innerHTML = "";
  if (keep) panel.appendChild(keep);

  OWASP_2025.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "webmap-dd-item";
    btn.type = "button";
    btn.setAttribute("role","option");
    btn.dataset.value = item.key;
    btn.setAttribute("aria-selected","false");
    btn.innerHTML = `
      <span>${escapeHtml(item.key)}</span>
      <span class="webmap-dd-hint">${escapeHtml(item.name)}</span>
    `;
    panel.appendChild(btn);
  });
}

document.addEventListener("click", () => closeAllDropdowns());
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape"){
    closeAllDropdowns();
    webmapClose();
  }
});

document.getElementById("webmap-search").addEventListener("input", (e) => {
  state.q = e.target.value || "";
  applyFilters();
});

document.getElementById("webmap-reset").addEventListener("click", () => {
  document.getElementById("webmap-search").value = "";
  state.q = "";
  state.mode = "all";
  state.severity = "all";
  state.owasp = "all";

  document.getElementById("webmap-mode-label").textContent = "All Testing Modes";
  document.getElementById("webmap-severity-label").textContent = "All Severities";
  document.getElementById("webmap-owasp-label").textContent = "OWASP Top 10 2025: All";

  setSelected(document.getElementById("webmap-dd-mode"), "all");
  setSelected(document.getElementById("webmap-dd-severity"), "all");
  setSelected(document.getElementById("webmap-dd-owasp"), "all");

  applyFilters();
});

document.getElementById("webmap-overlay").addEventListener("click", () => webmapClose());
document.getElementById("webmap-close-btn").addEventListener("click", () => webmapClose());

document.addEventListener("DOMContentLoaded", () => {
  buildOwaspDropdown();

  initDropdown("webmap-dd-mode", "webmap-mode-label", (val) => {
    state.mode = val;
    applyFilters();
  });

  initDropdown("webmap-dd-severity", "webmap-severity-label", (val) => {
    state.severity = val;
    applyFilters();
  });

  initDropdown("webmap-dd-owasp", "webmap-owasp-label", (val) => {
    state.owasp = val;
    applyFilters();
  });

  render();

  window.addEventListener("resize", () => {
    requestAnimationFrame(updateFitScale);
  });

  const hash = decodeURIComponent((location.hash || "").replace("#", "")).trim();
  if (hash){
    const target = [...document.querySelectorAll(".webmap-card")].find(c => c.dataset.id === hash);
    if (target){
      target.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
      target.click();
    }
  }
});
